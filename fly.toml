# fly.toml app configuration file generated for killtheclipboard on 2026-03-02T12:39:08-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'killtheclipboard'
primary_region = 'iad'

[build]

[env]
  DATABASE_PATH = "/data/ktc.db"

[mounts]
  source = "ktc_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
